<svg xmlns="http://www.w3.org/2000/svg" width="980" height="780" viewBox="0 0 980 780" font-family="Graphik LC, Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="980" height="780" fill="#ffffff"/>

  <!-- arrow-head defs -->
  <defs>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000080"/>
    </marker>
    <marker id="arrow-sage" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6b3a"/>
    </marker>
    <marker id="arrow-lavender" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a3a8e"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b9670a"/>
    </marker>
  </defs>

  <!-- Phase brackets -->
  <rect x="20" y="100" width="22" height="180" fill="none" stroke="#b9870a" stroke-width="1.5"/>
  <text x="14" y="190" fill="#b9870a" font-size="11" font-weight="600" transform="rotate(-90 14 190)" text-anchor="middle">PHASE 1: DEPOSIT</text>

  <rect x="20" y="290" width="22" height="120" fill="none" stroke="#2f6b3a" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="14" y="350" fill="#2f6b3a" font-size="11" font-weight="600" transform="rotate(-90 14 350)" text-anchor="middle">PHASE 2: KYT (off-chain)</text>

  <rect x="20" y="420" width="22" height="220" fill="none" stroke="#b9870a" stroke-width="1.5"/>
  <text x="14" y="530" fill="#b9870a" font-size="11" font-weight="600" transform="rotate(-90 14 530)" text-anchor="middle">PHASE 3: CLAIM + MINT</text>

  <!-- Lane: Lender -->
  <rect x="60" y="50" width="120" height="40" rx="6" fill="#ebeae9" stroke="#000080" stroke-width="1.5"/>
  <text text-anchor="middle" x="120" y="68" fill="#262524" font-size="12" font-weight="600">Lender</text>
  <text text-anchor="middle" x="120" y="82" fill="#736f6c" font-size="10">self-custodied wallet</text>
  <line x1="120" y1="100" x2="120" y2="650" stroke="#3837352e" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Lane: DepositManager -->
  <rect x="200" y="50" width="120" height="40" rx="6" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="260" y="68" fill="#262524" font-size="12" font-weight="600">DepositManager</text>
  <text text-anchor="middle" x="260" y="82" fill="#736f6c" font-size="10">on-chain contract</text>
  <line x1="260" y1="100" x2="260" y2="650" stroke="#3837352e" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Lane: Relayer (off-chain) -->
  <rect x="340" y="50" width="120" height="40" rx="6" fill="#f7f5f0" stroke="#2f6b3a" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text text-anchor="middle" x="400" y="68" fill="#262524" font-size="12" font-weight="600">Relayer</text>
  <text text-anchor="middle" x="400" y="82" fill="#736f6c" font-size="10">off-chain attestor</text>
  <line x1="400" y1="100" x2="400" y2="650" stroke="#3837352e" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Lane: WhitelistRegistry -->
  <rect x="480" y="50" width="120" height="40" rx="6" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="540" y="68" fill="#262524" font-size="12" font-weight="600">WhitelistRegistry</text>
  <text text-anchor="middle" x="540" y="82" fill="#736f6c" font-size="10">on-chain registry</text>
  <line x1="540" y1="100" x2="540" y2="650" stroke="#3837352e" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Lane: Intake Wallet -->
  <rect x="620" y="50" width="120" height="40" rx="6" fill="#fdf3e7" stroke="#b9670a" stroke-width="1.5"/>
  <text text-anchor="middle" x="680" y="68" fill="#262524" font-size="12" font-weight="600">Intake Wallet</text>
  <text text-anchor="middle" x="680" y="82" fill="#736f6c" font-size="10">MPC custody</text>
  <line x1="680" y1="100" x2="680" y2="650" stroke="#3837352e" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Lane: Capital Wallet -->
  <rect x="760" y="50" width="120" height="40" rx="6" fill="#fdf3e7" stroke="#b9670a" stroke-width="1.5"/>
  <text text-anchor="middle" x="820" y="68" fill="#262524" font-size="12" font-weight="600">Capital Wallet</text>
  <text text-anchor="middle" x="820" y="82" fill="#736f6c" font-size="10">MPC custody</text>
  <line x1="820" y1="100" x2="820" y2="650" stroke="#3837352e" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Lane: PLUSD -->
  <rect x="900" y="50" width="60" height="40" rx="6" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="930" y="68" fill="#262524" font-size="12" font-weight="600">PLUSD</text>
  <text text-anchor="middle" x="930" y="82" fill="#736f6c" font-size="9">ERC-20</text>
  <line x1="930" y1="100" x2="930" y2="650" stroke="#3837352e" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ===== PHASE 1: DEPOSIT ===== -->

  <!-- Step 1: Lender → DepositManager: deposit(amount) -->
  <circle cx="50" cy="130" r="12" fill="#000080"/>
  <text text-anchor="middle" x="50" y="134" fill="#ffffff" font-size="12" font-weight="700">1</text>
  <line x1="120" y1="130" x2="254" y2="130" stroke="#000080" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <text text-anchor="middle" x="187" y="123" fill="#262524" font-size="11" font-weight="600">deposit(amount)</text>

  <!-- Step 2: DepositManager → Intake Wallet: USDC.transferFrom(lender, intake, amount) -->
  <circle cx="50" cy="180" r="12" fill="#000080"/>
  <text text-anchor="middle" x="50" y="184" fill="#ffffff" font-size="12" font-weight="700">2</text>
  <line x1="260" y1="180" x2="674" y2="180" stroke="#2f6b3a" stroke-width="3" marker-end="url(#arrow-sage)"/>
  <text text-anchor="middle" x="467" y="173" fill="#262524" font-size="11" font-weight="600">USDC.transferFrom(lender, intakeWallet, amount)</text>
  <text text-anchor="middle" x="467" y="195" fill="#736f6c" font-size="10">lender's USDC parked in Intake Wallet</text>

  <!-- Step 3: Ticket created (Pending) -->
  <circle cx="50" cy="240" r="12" fill="#000080"/>
  <text text-anchor="middle" x="50" y="244" fill="#ffffff" font-size="12" font-weight="700">3</text>
  <rect x="200" y="226" width="120" height="32" rx="4" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1"/>
  <text text-anchor="middle" x="260" y="240" fill="#262524" font-size="10" font-weight="600">create ticket</text>
  <text text-anchor="middle" x="260" y="253" fill="#736f6c" font-size="10">{amount, Pending}</text>

  <!-- Phase divider 1->2 -->
  <line x1="60" y1="290" x2="960" y2="290" stroke="#2f6b3a" stroke-width="1" stroke-dasharray="6 3"/>

  <!-- ===== PHASE 2: OFF-CHAIN KYT ===== -->

  <!-- Step 4: Relayer runs KYT -->
  <circle cx="50" cy="315" r="12" fill="#2f6b3a"/>
  <text text-anchor="middle" x="50" y="319" fill="#ffffff" font-size="12" font-weight="700">4</text>
  <rect x="340" y="301" width="120" height="32" rx="4" fill="#f7f5f0" stroke="#2f6b3a" stroke-width="1" stroke-dasharray="3 2"/>
  <text text-anchor="middle" x="400" y="315" fill="#262524" font-size="10" font-weight="600">run KYT</text>
  <text text-anchor="middle" x="400" y="328" fill="#736f6c" font-size="10">address + tx</text>

  <!-- Step 5: Relayer signs attestation (off-chain, no on-chain write) -->
  <circle cx="50" cy="360" r="12" fill="#2f6b3a"/>
  <text text-anchor="middle" x="50" y="364" fill="#ffffff" font-size="12" font-weight="700">5</text>
  <rect x="340" y="346" width="120" height="32" rx="4" fill="#f7f5f0" stroke="#2f6b3a" stroke-width="1" stroke-dasharray="3 2"/>
  <text text-anchor="middle" x="400" y="360" fill="#262524" font-size="10" font-weight="600">sign attestation</text>
  <text text-anchor="middle" x="400" y="373" fill="#736f6c" font-size="9">EIP-712 ClaimAttestation</text>

  <!-- Step 6: Lender fetches attestation via API (off-chain dashed arrow) -->
  <circle cx="50" cy="395" r="12" fill="#2f6b3a"/>
  <text text-anchor="middle" x="50" y="399" fill="#ffffff" font-size="12" font-weight="700">6</text>
  <line x1="394" y1="395" x2="126" y2="395" stroke="#2f6b3a" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow-sage)"/>
  <text text-anchor="middle" x="260" y="388" fill="#262524" font-size="11" font-weight="600">attestation via API</text>
  <text text-anchor="middle" x="260" y="409" fill="#736f6c" font-size="10">no on-chain Relayer write</text>

  <!-- Phase divider 2->3 -->
  <line x1="60" y1="420" x2="960" y2="420" stroke="#b9870a" stroke-width="1" stroke-dasharray="6 3"/>

  <!-- ===== PHASE 3: CLAIM + MINT ===== -->

  <!-- Step 7: Lender → DepositManager: claim(depositId, att, sig) -->
  <circle cx="50" cy="445" r="12" fill="#000080"/>
  <text text-anchor="middle" x="50" y="449" fill="#ffffff" font-size="12" font-weight="700">7</text>
  <line x1="120" y1="445" x2="254" y2="445" stroke="#000080" stroke-width="2" marker-end="url(#arrow-slate)"/>
  <text text-anchor="middle" x="187" y="438" fill="#262524" font-size="11" font-weight="600">claim(depositId, att, sig)</text>

  <!-- Step 8: DepositManager verifies signature (self-call box) -->
  <circle cx="50" cy="490" r="12" fill="#000080"/>
  <text text-anchor="middle" x="50" y="494" fill="#ffffff" font-size="12" font-weight="700">8</text>
  <rect x="200" y="476" width="120" height="32" rx="4" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1"/>
  <text text-anchor="middle" x="260" y="490" fill="#262524" font-size="10" font-weight="600">verify sig</text>
  <text text-anchor="middle" x="260" y="503" fill="#736f6c" font-size="10">vs kytAttestor</text>

  <!-- Step 9: DepositManager → WhitelistRegistry: setAccess (auto-enrol) -->
  <circle cx="50" cy="535" r="12" fill="#000080"/>
  <text text-anchor="middle" x="50" y="539" fill="#ffffff" font-size="12" font-weight="700">9</text>
  <line x1="260" y1="535" x2="534" y2="535" stroke="#4a3a8e" stroke-width="2" marker-end="url(#arrow-lavender)"/>
  <text text-anchor="middle" x="397" y="528" fill="#262524" font-size="11" font-weight="600">setAccess(lender, approvedAt)</text>
  <text text-anchor="middle" x="397" y="550" fill="#736f6c" font-size="10">auto-enrol depositor in transfer whitelist</text>

  <!-- Step 10: USDC.transferFrom(intake, capital, amount) -->
  <circle cx="50" cy="575" r="12" fill="#000080"/>
  <text text-anchor="middle" x="50" y="579" fill="#ffffff" font-size="12" font-weight="700">10</text>
  <line x1="680" y1="575" x2="814" y2="575" stroke="#2f6b3a" stroke-width="3" marker-end="url(#arrow-sage)"/>
  <text text-anchor="middle" x="747" y="568" fill="#262524" font-size="11" font-weight="600">USDC pull</text>
  <text text-anchor="middle" x="747" y="590" fill="#736f6c" font-size="10">Intake to Capital</text>

  <!-- Step 11: PLUSD.mintForDeposit -->
  <circle cx="50" cy="620" r="12" fill="#000080"/>
  <text text-anchor="middle" x="50" y="624" fill="#ffffff" font-size="12" font-weight="700">11</text>
  <line x1="260" y1="620" x2="924" y2="620" stroke="#4a3a8e" stroke-width="2" marker-end="url(#arrow-lavender)"/>
  <text text-anchor="middle" x="592" y="613" fill="#262524" font-size="11" font-weight="600">mintForDeposit(lender, amount)</text>
  <text text-anchor="middle" x="592" y="634" fill="#736f6c" font-size="10">DEPOSITOR role · PLUSD balance up 1:1</text>

  <!-- Bottom note -->
  <rect x="60" y="660" width="900" height="78" rx="6" fill="#ebeae9" stroke="#b9870a" stroke-width="1"/>
  <text text-anchor="middle" x="510" y="682" fill="#262524" font-size="12" font-weight="600">The Relayer never writes to DepositManager directly.</text>
  <text text-anchor="middle" x="510" y="700" fill="#262524" font-size="11">It signs an off-chain attestation that the lender submits at claim time. The contract verifies the signature on-chain.</text>
  <text text-anchor="middle" x="510" y="717" fill="#736f6c" font-size="10">PLUSD remains 1:1 backed in every state. Mint only at claim, against USDC the lender already deposited into the Intake Wallet.</text>
  <text text-anchor="middle" x="510" y="732" fill="#736f6c" font-size="10">A Relayer key compromise can sign valid attestations but cannot mint without a real ticket. Risk is AML, not direct theft.</text>
</svg>
