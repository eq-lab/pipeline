<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- background -->
  <rect width="960" height="720" fill="#0f1419"/>

  <!-- ========== OFF-CHAIN CASH RAIL ========== -->
  <rect x="20" y="20" width="300" height="500" rx="10" fill="rgba(158,206,106,0.05)" stroke="#9ece6a" stroke-width="1.5"/>
  <text text-anchor="middle" x="170" y="46" fill="#9ece6a" font-size="12" font-weight="700" letter-spacing="1">OFF-CHAIN · CASH RAIL</text>

  <!-- Custodian -->
  <rect x="38" y="68" width="264" height="84" rx="8" fill="#1a2030" stroke="#9ece6a" stroke-width="1.5"/>
  <text text-anchor="middle" x="170" y="90" fill="#e6edf3" font-size="13" font-weight="600">Custodian (regulated)</text>
  <text text-anchor="middle" x="170" y="109" fill="#8b949e" font-size="11">holds USDC under MPC policy</text>
  <text text-anchor="middle" x="170" y="126" fill="#8b949e" font-size="11">EIP-1271 signer for yield mints</text>
  <text text-anchor="middle" x="170" y="144" fill="#9ece6a" font-size="10" font-style="italic">independent legal entity</text>

  <!-- Capital Wallet -->
  <rect x="38" y="172" width="264" height="90" rx="8" fill="#1a2030" stroke="#9ece6a" stroke-width="1.5"/>
  <text text-anchor="middle" x="170" y="194" fill="#e6edf3" font-size="13" font-weight="600">Capital Wallet</text>
  <text text-anchor="middle" x="170" y="213" fill="#8b949e" font-size="11">all LP USDC + deployed loan USDC</text>
  <text text-anchor="middle" x="170" y="230" fill="#8b949e" font-size="11">cosigners: Trustee + Team + Bridge</text>
  <text text-anchor="middle" x="170" y="250" fill="#9ece6a" font-size="10" font-style="italic">no contract ever custodies USDC</text>

  <!-- Treasury Wallet -->
  <rect x="38" y="282" width="264" height="70" rx="8" fill="#1a2030" stroke="#9ece6a" stroke-width="1.5"/>
  <text text-anchor="middle" x="170" y="304" fill="#e6edf3" font-size="13" font-weight="600">Treasury Wallet</text>
  <text text-anchor="middle" x="170" y="322" fill="#8b949e" font-size="11">protocol fees · 30% T-bill share</text>
  <text text-anchor="middle" x="170" y="340" fill="#9ece6a" font-size="10" font-style="italic">MPC-controlled, separate cosigners</text>

  <!-- Bridge -->
  <rect x="38" y="372" width="264" height="80" rx="8" fill="#1a2030" stroke="#f7768e" stroke-width="1.5"/>
  <text text-anchor="middle" x="170" y="394" fill="#e6edf3" font-size="13" font-weight="600">Bridge</text>
  <text text-anchor="middle" x="170" y="412" fill="#8b949e" font-size="11">indexer · co-signer · queue funder</text>
  <text text-anchor="middle" x="170" y="430" fill="#8b949e" font-size="11">whitelist admin</text>
  <text text-anchor="middle" x="170" y="448" fill="#f7768e" font-size="10" font-style="italic">validator only — no USDC</text>

  <!-- Trustee -->
  <rect x="38" y="468" width="264" height="40" rx="8" fill="#1a2030" stroke="#e0af68" stroke-width="1.5"/>
  <text text-anchor="middle" x="170" y="485" fill="#e6edf3" font-size="12" font-weight="600">Trustee</text>
  <text text-anchor="middle" x="170" y="501" fill="#8b949e" font-size="10">Capital Wallet cosigner + LoanRegistry writer</text>

  <!-- ========== ON-CHAIN TOKEN RAIL ========== -->
  <rect x="340" y="20" width="600" height="500" rx="10" fill="rgba(187,154,247,0.05)" stroke="#bb9af7" stroke-width="1.5"/>
  <text text-anchor="middle" x="640" y="46" fill="#bb9af7" font-size="12" font-weight="700" letter-spacing="1">ON-CHAIN · TOKEN RAIL</text>

  <!-- AccessManager hub -->
  <rect x="358" y="68" width="564" height="48" rx="8" fill="#1c2333" stroke="#bb9af7" stroke-width="2.5"/>
  <text text-anchor="middle" x="640" y="90" fill="#bb9af7" font-size="13" font-weight="700">AccessManager</text>
  <text text-anchor="middle" x="640" y="108" fill="#8b949e" font-size="10">role hub · per-target delays · timelocked action scheduling</text>

  <!-- Row 1: DepositManager · PLUSD · sPLUSD -->
  <rect x="358" y="132" width="180" height="88" rx="8" fill="#1c2333" stroke="#bb9af7" stroke-width="1.5"/>
  <text text-anchor="middle" x="448" y="154" fill="#e6edf3" font-size="13" font-weight="600">DepositManager</text>
  <text text-anchor="middle" x="448" y="172" fill="#8b949e" font-size="10">atomic 1:1 USDC → PLUSD</text>
  <text text-anchor="middle" x="448" y="188" fill="#8b949e" font-size="10">holds DEPOSITOR on PLUSD</text>
  <text text-anchor="middle" x="448" y="208" fill="#bb9af7" font-size="10" font-style="italic">no off-chain signer</text>

  <rect x="550" y="132" width="180" height="88" rx="8" fill="#1c2333" stroke="#bb9af7" stroke-width="1.5"/>
  <text text-anchor="middle" x="640" y="154" fill="#e6edf3" font-size="13" font-weight="600">PLUSD</text>
  <text text-anchor="middle" x="640" y="172" fill="#8b949e" font-size="10">ERC-20 receipt · Pausable</text>
  <text text-anchor="middle" x="640" y="188" fill="#8b949e" font-size="10">reserve invariant · caps</text>
  <text text-anchor="middle" x="640" y="208" fill="#8b949e" font-size="10">whitelist on transfer</text>

  <rect x="742" y="132" width="180" height="88" rx="8" fill="#1c2333" stroke="#bb9af7" stroke-width="1.5"/>
  <text text-anchor="middle" x="832" y="154" fill="#e6edf3" font-size="13" font-weight="600">sPLUSD</text>
  <text text-anchor="middle" x="832" y="172" fill="#8b949e" font-size="10">ERC-4626 vault</text>
  <text text-anchor="middle" x="832" y="188" fill="#8b949e" font-size="10">asset = PLUSD</text>
  <text text-anchor="middle" x="832" y="208" fill="#8b949e" font-size="10">share price rises on yield mint</text>

  <!-- Row 2: WithdrawalQueue · WhitelistRegistry · LoanRegistry -->
  <rect x="358" y="236" width="180" height="88" rx="8" fill="#1c2333" stroke="#bb9af7" stroke-width="1.5"/>
  <text text-anchor="middle" x="448" y="258" fill="#e6edf3" font-size="13" font-weight="600">WithdrawalQueue</text>
  <text text-anchor="middle" x="448" y="276" fill="#8b949e" font-size="10">strict FIFO · PLUSD escrow</text>
  <text text-anchor="middle" x="448" y="292" fill="#8b949e" font-size="10">Pending · Funded · Claimed</text>
  <text text-anchor="middle" x="448" y="310" fill="#8b949e" font-size="10">holds BURNER on PLUSD</text>

  <rect x="550" y="236" width="180" height="88" rx="8" fill="#1c2333" stroke="#bb9af7" stroke-width="1.5"/>
  <text text-anchor="middle" x="640" y="258" fill="#e6edf3" font-size="13" font-weight="600">WhitelistRegistry</text>
  <text text-anchor="middle" x="640" y="276" fill="#8b949e" font-size="10">KYC'd LPs · DeFi venues</text>
  <text text-anchor="middle" x="640" y="292" fill="#8b949e" font-size="10">Chainalysis freshness (90d)</text>
  <text text-anchor="middle" x="640" y="310" fill="#8b949e" font-size="10">gated by PLUSD `_update`</text>

  <rect x="742" y="236" width="180" height="88" rx="8" fill="#1c2333" stroke="#e0af68" stroke-width="1.5"/>
  <text text-anchor="middle" x="832" y="258" fill="#e6edf3" font-size="13" font-weight="600">LoanRegistry</text>
  <text text-anchor="middle" x="832" y="276" fill="#8b949e" font-size="10">soulbound ERC-721 per loan</text>
  <text text-anchor="middle" x="832" y="292" fill="#8b949e" font-size="10">TRUSTEE writes only</text>
  <text text-anchor="middle" x="832" y="310" fill="#e0af68" font-size="10" font-style="italic">informational · no capital</text>

  <!-- Row 3: ShutdownController · RecoveryPool -->
  <rect x="358" y="340" width="180" height="88" rx="8" fill="#1c2333" stroke="#bb9af7" stroke-width="1.5"/>
  <text text-anchor="middle" x="448" y="362" fill="#e6edf3" font-size="13" font-weight="600">ShutdownController</text>
  <text text-anchor="middle" x="448" y="380" fill="#8b949e" font-size="10">one-way terminal switch</text>
  <text text-anchor="middle" x="448" y="396" fill="#8b949e" font-size="10">fixes recoveryRateBps</text>
  <text text-anchor="middle" x="448" y="414" fill="#8b949e" font-size="10">rate ratchets up only</text>

  <rect x="550" y="340" width="180" height="88" rx="8" fill="#1c2333" stroke="#bb9af7" stroke-width="1.5"/>
  <text text-anchor="middle" x="640" y="362" fill="#e6edf3" font-size="13" font-weight="600">RecoveryPool</text>
  <text text-anchor="middle" x="640" y="380" fill="#8b949e" font-size="10">post-shutdown USDC escrow</text>
  <text text-anchor="middle" x="640" y="396" fill="#8b949e" font-size="10">pull-based redemption</text>
  <text text-anchor="middle" x="640" y="414" fill="#8b949e" font-size="10">at frozen recovery rate</text>

  <!-- legend box on the right -->
  <rect x="742" y="340" width="180" height="88" rx="8" fill="#1a2030" stroke="#2a313c" stroke-width="1"/>
  <text text-anchor="middle" x="832" y="362" fill="#e6edf3" font-size="12" font-weight="600">Split-rail invariant</text>
  <text text-anchor="middle" x="832" y="381" fill="#8b949e" font-size="10">cash rail never on-chain.</text>
  <text text-anchor="middle" x="832" y="396" fill="#8b949e" font-size="10">token rail never custodies</text>
  <text text-anchor="middle" x="832" y="411" fill="#9ece6a" font-size="10" font-style="italic">a bug cannot drain funds</text>

  <!-- Actors band (Lender + Borrower) -->
  <rect x="340" y="442" width="600" height="66" rx="8" fill="#1a2030" stroke="#7aa2f7" stroke-width="1.5"/>
  <text x="362" y="466" fill="#7aa2f7" font-size="12" font-weight="700">Lender (KYC'd)</text>
  <text x="362" y="484" fill="#8b949e" font-size="10">deposits USDC · holds PLUSD / sPLUSD · withdraws USDC</text>
  <text x="362" y="500" fill="#8b949e" font-size="10">whitelisted in WhitelistRegistry</text>
  <text x="640" y="466" fill="#7aa2f7" font-size="12" font-weight="700">Borrower (KYB'd)</text>
  <text x="640" y="484" fill="#8b949e" font-size="10">sourced via approved originator (Open Mineral)</text>
  <text x="640" y="500" fill="#8b949e" font-size="10">senior + equity tranche · repays from offtaker wire</text>

  <!-- ========== GOVERNANCE BAND ========== -->
  <rect x="20" y="538" width="920" height="164" rx="10" fill="rgba(122,162,247,0.04)" stroke="#7aa2f7" stroke-width="1"/>
  <text text-anchor="middle" x="480" y="564" fill="#7aa2f7" font-size="12" font-weight="700" letter-spacing="1">GOVERNANCE · three Safes · all writes through AccessManager</text>

  <rect x="40" y="580" width="290" height="104" rx="8" fill="#1a2030" stroke="#e0af68" stroke-width="1.5"/>
  <text x="58" y="604" fill="#e0af68" font-size="12" font-weight="700">ADMIN · 3/5</text>
  <text x="58" y="622" fill="#8b949e" font-size="10">role grants · unpause · upgrades · parameters</text>
  <text x="58" y="638" fill="#8b949e" font-size="10">schedules on 48h delay (14d meta-timelock)</text>
  <text x="58" y="658" fill="#e0af68" font-size="10" font-style="italic">slow path · everything timelocked</text>

  <rect x="335" y="580" width="290" height="104" rx="8" fill="#1a2030" stroke="#bb9af7" stroke-width="1.5"/>
  <text x="353" y="604" fill="#bb9af7" font-size="12" font-weight="700">RISK_COUNCIL · 3/5</text>
  <text x="353" y="622" fill="#8b949e" font-size="10">setDefault · proposeShutdown</text>
  <text x="353" y="638" fill="#8b949e" font-size="10">adjustRecoveryRateUp (up only)</text>
  <text x="353" y="658" fill="#bb9af7" font-size="10" font-style="italic">credit + wind-down · 24h delay</text>

  <rect x="630" y="580" width="290" height="104" rx="8" fill="#1a2030" stroke="#f7768e" stroke-width="1.5"/>
  <text x="648" y="604" fill="#f7768e" font-size="12" font-weight="700">GUARDIAN · 2/5</text>
  <text x="648" y="622" fill="#8b949e" font-size="10">pause any contract · cancel pending ADMIN</text>
  <text x="648" y="638" fill="#8b949e" font-size="10">revoke named operational-role holders</text>
  <text x="648" y="658" fill="#f7768e" font-size="10" font-style="italic">instant · granular · no grants</text>
</svg>
