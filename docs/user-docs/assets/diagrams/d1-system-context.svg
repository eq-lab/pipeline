<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" font-family="Graphik LC, Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="960" height="620" fill="#ffffff"/>

  <!-- ========== OFF-CHAIN CASH RAIL ========== -->
  <rect x="20" y="20" width="300" height="420" rx="10" fill="rgba(47,107,58,0.06)" stroke="#2f6b3a" stroke-width="1.5"/>
  <text text-anchor="middle" x="170" y="46" fill="#2f6b3a" font-size="13" font-weight="700" letter-spacing="1">OFF-CHAIN · CASH RAIL</text>

  <!-- Custodian -->
  <rect x="38" y="66" width="264" height="66" rx="8" fill="#ebeae9" stroke="#2f6b3a" stroke-width="1.5"/>
  <text text-anchor="middle" x="170" y="90" fill="#262524" font-size="14" font-weight="600">Custodian</text>
  <text text-anchor="middle" x="170" y="110" fill="#736f6c" font-size="11">regulated third party · MPC policy</text>
  <text text-anchor="middle" x="170" y="125" fill="#736f6c" font-size="11">EIP-1271 signer for yield mints</text>

  <!-- Capital Wallet -->
  <rect x="38" y="146" width="264" height="66" rx="8" fill="#ebeae9" stroke="#2f6b3a" stroke-width="1.5"/>
  <text text-anchor="middle" x="170" y="170" fill="#262524" font-size="14" font-weight="600">Capital Wallet</text>
  <text text-anchor="middle" x="170" y="190" fill="#736f6c" font-size="11">holds all USDC + USYC reserves</text>
  <text text-anchor="middle" x="170" y="205" fill="#736f6c" font-size="11">cosigners: Trustee + Team + Relayer</text>

  <!-- Treasury Wallet -->
  <rect x="38" y="226" width="264" height="56" rx="8" fill="#ebeae9" stroke="#2f6b3a" stroke-width="1.5"/>
  <text text-anchor="middle" x="170" y="250" fill="#262524" font-size="14" font-weight="600">Treasury Wallet</text>
  <text text-anchor="middle" x="170" y="270" fill="#736f6c" font-size="11">protocol fees · 30% T-bill share</text>

  <!-- Relayer -->
  <rect x="38" y="296" width="264" height="66" rx="8" fill="#ebeae9" stroke="#b1334b" stroke-width="1.5"/>
  <text text-anchor="middle" x="170" y="320" fill="#262524" font-size="14" font-weight="600">Relayer</text>
  <text text-anchor="middle" x="170" y="340" fill="#736f6c" font-size="11">indexer · yield co-signer · queue funder</text>
  <text text-anchor="middle" x="170" y="355" fill="#736f6c" font-size="11">whitelist admin · never custodies USDC</text>

  <!-- Trustee -->
  <rect x="38" y="376" width="264" height="52" rx="8" fill="#ebeae9" stroke="#b9870a" stroke-width="1.5"/>
  <text text-anchor="middle" x="170" y="400" fill="#262524" font-size="14" font-weight="600">Trustee</text>
  <text text-anchor="middle" x="170" y="420" fill="#736f6c" font-size="11">Capital Wallet cosigner + LoanRegistry writer</text>

  <!-- ========== ON-CHAIN TOKEN RAIL ========== -->
  <rect x="340" y="20" width="600" height="420" rx="10" fill="rgba(74,58,142,0.05)" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="640" y="46" fill="#4a3a8e" font-size="13" font-weight="700" letter-spacing="1">ON-CHAIN · TOKEN RAIL</text>

  <!-- AccessManager hub -->
  <rect x="358" y="66" width="564" height="52" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="2.5"/>
  <text text-anchor="middle" x="640" y="90" fill="#4a3a8e" font-size="14" font-weight="700">AccessManager</text>
  <text text-anchor="middle" x="640" y="108" fill="#736f6c" font-size="11">role hub · timelocked scheduling · per-target delays</text>

  <!-- Row 1: DepositManager · PLUSD · sPLUSD -->
  <rect x="358" y="134" width="180" height="78" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="448" y="158" fill="#262524" font-size="14" font-weight="600">DepositManager</text>
  <text text-anchor="middle" x="448" y="178" fill="#736f6c" font-size="11">atomic 1:1 USDC → PLUSD</text>
  <text text-anchor="middle" x="448" y="195" fill="#736f6c" font-size="11">no off-chain signer</text>

  <rect x="550" y="134" width="180" height="78" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="640" y="158" fill="#262524" font-size="14" font-weight="600">PLUSD</text>
  <text text-anchor="middle" x="640" y="178" fill="#736f6c" font-size="11">ERC-20 receipt · Pausable</text>
  <text text-anchor="middle" x="640" y="195" fill="#736f6c" font-size="11">reserve invariant · whitelist gate</text>

  <rect x="742" y="134" width="180" height="78" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="832" y="158" fill="#262524" font-size="14" font-weight="600">sPLUSD</text>
  <text text-anchor="middle" x="832" y="178" fill="#736f6c" font-size="11">ERC-4626 yield vault</text>
  <text text-anchor="middle" x="832" y="195" fill="#736f6c" font-size="11">share price rises on yieldMint</text>

  <!-- Row 2: WithdrawalQueue · WhitelistRegistry · LoanRegistry -->
  <rect x="358" y="226" width="180" height="78" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="448" y="250" fill="#262524" font-size="14" font-weight="600">WithdrawalQueue</text>
  <text text-anchor="middle" x="448" y="270" fill="#736f6c" font-size="11">strict FIFO · PLUSD escrow</text>
  <text text-anchor="middle" x="448" y="287" fill="#736f6c" font-size="11">Pending · Funded · Claimed</text>

  <rect x="550" y="226" width="180" height="78" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="640" y="250" fill="#262524" font-size="14" font-weight="600">WhitelistRegistry</text>
  <text text-anchor="middle" x="640" y="270" fill="#736f6c" font-size="11">KYC'd LPs + DeFi venues</text>
  <text text-anchor="middle" x="640" y="287" fill="#736f6c" font-size="11">90-day Chainalysis freshness</text>

  <rect x="742" y="226" width="180" height="78" rx="8" fill="#ebeae9" stroke="#b9870a" stroke-width="1.5"/>
  <text text-anchor="middle" x="832" y="250" fill="#262524" font-size="14" font-weight="600">LoanRegistry</text>
  <text text-anchor="middle" x="832" y="270" fill="#736f6c" font-size="11">soulbound ERC-721 per loan</text>
  <text text-anchor="middle" x="832" y="287" fill="#b9870a" font-size="11" font-style="italic">informational · holds no capital</text>

  <!-- Row 3: ShutdownController · RecoveryPool -->
  <rect x="358" y="318" width="180" height="78" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="448" y="342" fill="#262524" font-size="14" font-weight="600">ShutdownController</text>
  <text text-anchor="middle" x="448" y="362" fill="#736f6c" font-size="11">one-way terminal switch</text>
  <text text-anchor="middle" x="448" y="379" fill="#736f6c" font-size="11">fixes recoveryRateBps</text>

  <rect x="550" y="318" width="180" height="78" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="640" y="342" fill="#262524" font-size="14" font-weight="600">RecoveryPool</text>
  <text text-anchor="middle" x="640" y="362" fill="#736f6c" font-size="11">post-shutdown USDC escrow</text>
  <text text-anchor="middle" x="640" y="379" fill="#736f6c" font-size="11">pull-based redemption</text>

  <!-- ========== GOVERNANCE BAND ========== -->
  <rect x="20" y="458" width="920" height="144" rx="10" fill="rgba(122,162,247,0.04)" stroke="#000080" stroke-width="1"/>
  <text text-anchor="middle" x="480" y="482" fill="#000080" font-size="13" font-weight="700" letter-spacing="1">GOVERNANCE · three Safes · all writes through AccessManager</text>

  <rect x="40" y="496" width="290" height="92" rx="8" fill="#ebeae9" stroke="#b9870a" stroke-width="1.5"/>
  <text x="58" y="520" fill="#b9870a" font-size="13" font-weight="700">ADMIN · 3/5</text>
  <text x="58" y="540" fill="#736f6c" font-size="11">role grants · unpause · upgrades</text>
  <text x="58" y="556" fill="#736f6c" font-size="11">parameter changes · attestor rotation</text>
  <text x="58" y="576" fill="#b9870a" font-size="11" font-style="italic">48h timelock · 14d on delay changes</text>

  <rect x="335" y="496" width="290" height="92" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text x="353" y="520" fill="#4a3a8e" font-size="13" font-weight="700">RISK_COUNCIL · 3/5</text>
  <text x="353" y="540" fill="#736f6c" font-size="11">setDefault · proposeShutdown</text>
  <text x="353" y="556" fill="#736f6c" font-size="11">adjustRecoveryRateUp (up only)</text>
  <text x="353" y="576" fill="#4a3a8e" font-size="11" font-style="italic">24h timelock · credit + wind-down</text>

  <rect x="630" y="496" width="290" height="92" rx="8" fill="#ebeae9" stroke="#b1334b" stroke-width="1.5"/>
  <text x="648" y="520" fill="#b1334b" font-size="13" font-weight="700">GUARDIAN · 2/5</text>
  <text x="648" y="540" fill="#736f6c" font-size="11">pause any contract · cancel pending</text>
  <text x="648" y="556" fill="#736f6c" font-size="11">revoke named operational-role holders</text>
  <text x="648" y="576" fill="#b1334b" font-size="11" font-style="italic">instant · granular · no grants</text>
</svg>
