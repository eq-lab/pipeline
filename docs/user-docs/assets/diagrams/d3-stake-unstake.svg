<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="Graphik LC, Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="900" height="540" fill="#ffffff"/>

  <defs>
    <marker id="arrow-lav-3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a3a8e"/>
    </marker>
    <marker id="arrow-sl-3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000080"/>
    </marker>
  </defs>

  <!-- ========== LEFT PANEL: STAKE ========== -->
  <rect x="20" y="20" width="420" height="500" rx="10" fill="rgba(158,206,106,0.04)" stroke="#2f6b3a" stroke-width="1.5"/>
  <text text-anchor="middle" x="230" y="48" fill="#2f6b3a" font-size="14" font-weight="700">STAKE</text>
  <text text-anchor="middle" x="230" y="66" fill="#736f6c" font-size="11">PLUSD → sPLUSD shares</text>

  <!-- Stake lanes -->
  <rect x="50" y="86" width="160" height="36" rx="6" fill="#ebeae9" stroke="#000080" stroke-width="1.5"/>
  <text text-anchor="middle" x="130" y="108" fill="#262524" font-size="12" font-weight="600">Lender</text>
  <line x1="130" y1="130" x2="130" y2="470" stroke="#3837352e" stroke-width="1" stroke-dasharray="4 4"/>

  <rect x="250" y="86" width="160" height="36" rx="6" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="330" y="108" fill="#262524" font-size="12" font-weight="600">sPLUSD vault</text>
  <line x1="330" y1="130" x2="330" y2="470" stroke="#3837352e" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Stake step 1: deposit(assets, receiver) -->
  <circle cx="40" cy="160" r="11" fill="#000080"/>
  <text text-anchor="middle" x="40" y="164" fill="#ffffff" font-size="11" font-weight="700">1</text>
  <line x1="130" y1="160" x2="324" y2="160" stroke="#000080" stroke-width="2" marker-end="url(#arrow-sl-3)"/>
  <text text-anchor="middle" x="227" y="152" fill="#262524" font-size="11" font-weight="600">deposit(assets, receiver)</text>
  <text text-anchor="middle" x="227" y="175" fill="#736f6c" font-size="10">ERC-4626 standard entry</text>

  <!-- Stake step 2: PLUSD.transferFrom(lender → vault) -->
  <circle cx="40" cy="220" r="11" fill="#000080"/>
  <text text-anchor="middle" x="40" y="224" fill="#ffffff" font-size="11" font-weight="700">2</text>
  <line x1="130" y1="220" x2="324" y2="220" stroke="#4a3a8e" stroke-width="2" marker-end="url(#arrow-lav-3)"/>
  <text text-anchor="middle" x="227" y="212" fill="#262524" font-size="11" font-weight="600">PLUSD.transferFrom(lender, vault)</text>
  <text text-anchor="middle" x="227" y="235" fill="#736f6c" font-size="10">prior approve required</text>

  <!-- Stake step 3: vault mints shares to receiver -->
  <circle cx="40" cy="290" r="11" fill="#000080"/>
  <text text-anchor="middle" x="40" y="294" fill="#ffffff" font-size="11" font-weight="700">3</text>
  <line x1="330" y1="290" x2="141" y2="290" stroke="#4a3a8e" stroke-width="2" marker-end="url(#arrow-lav-3)"/>
  <text text-anchor="middle" x="235" y="282" fill="#262524" font-size="11" font-weight="600">sPLUSD shares minted to receiver</text>
  <text text-anchor="middle" x="235" y="305" fill="#736f6c" font-size="10">shares = assets × totalSupply / totalAssets</text>

  <!-- Stake open-access callout -->
  <rect x="40" y="340" width="380" height="120" rx="6" fill="#ebeae9" stroke="#2f6b3a" stroke-width="1"/>
  <text text-anchor="middle" x="230" y="362" fill="#2f6b3a" font-size="11" font-weight="700">OPEN ACCESS TO STAKE</text>
  <text text-anchor="middle" x="230" y="382" fill="#736f6c" font-size="11">Any PLUSD holder can stake — no KYC at the</text>
  <text text-anchor="middle" x="230" y="399" fill="#736f6c" font-size="11">sPLUSD vault. The whitelist gate lives on PLUSD</text>
  <text text-anchor="middle" x="230" y="416" fill="#736f6c" font-size="11">itself (enforced on the underlying transfer).</text>
  <text text-anchor="middle" x="230" y="443" fill="#2f6b3a" font-size="10" font-style="italic">Including DeFi venues (approved venue allowlist).</text>

  <!-- ========== RIGHT PANEL: UNSTAKE ========== -->
  <rect x="460" y="20" width="420" height="500" rx="10" fill="rgba(247,118,142,0.04)" stroke="#b1334b" stroke-width="1.5"/>
  <text text-anchor="middle" x="670" y="48" fill="#b1334b" font-size="14" font-weight="700">UNSTAKE</text>
  <text text-anchor="middle" x="670" y="66" fill="#736f6c" font-size="11">sPLUSD shares → PLUSD (+ withdraw chain)</text>

  <!-- Unstake lanes -->
  <rect x="490" y="86" width="160" height="36" rx="6" fill="#ebeae9" stroke="#000080" stroke-width="1.5"/>
  <text text-anchor="middle" x="570" y="108" fill="#262524" font-size="12" font-weight="600">Lender</text>
  <line x1="570" y1="130" x2="570" y2="470" stroke="#3837352e" stroke-width="1" stroke-dasharray="4 4"/>

  <rect x="690" y="86" width="160" height="36" rx="6" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1.5"/>
  <text text-anchor="middle" x="770" y="108" fill="#262524" font-size="12" font-weight="600">sPLUSD vault</text>
  <line x1="770" y1="130" x2="770" y2="470" stroke="#3837352e" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Unstake step 1: redeem(shares, receiver, owner) -->
  <circle cx="480" cy="160" r="11" fill="#000080"/>
  <text text-anchor="middle" x="480" y="164" fill="#ffffff" font-size="11" font-weight="700">1</text>
  <line x1="570" y1="160" x2="764" y2="160" stroke="#000080" stroke-width="2" marker-end="url(#arrow-sl-3)"/>
  <text text-anchor="middle" x="667" y="152" fill="#262524" font-size="11" font-weight="600">redeem(shares, receiver, owner)</text>

  <!-- Unstake step 2: burn sPLUSD shares -->
  <circle cx="480" cy="220" r="11" fill="#000080"/>
  <text text-anchor="middle" x="480" y="224" fill="#ffffff" font-size="11" font-weight="700">2</text>
  <rect x="690" y="206" width="160" height="30" rx="4" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1"/>
  <text text-anchor="middle" x="770" y="225" fill="#736f6c" font-size="10">burn sPLUSD shares</text>

  <!-- Unstake step 3: PLUSD transfer to receiver (whitelist-gated) -->
  <circle cx="480" cy="290" r="11" fill="#000080"/>
  <text text-anchor="middle" x="480" y="294" fill="#ffffff" font-size="11" font-weight="700">3</text>
  <line x1="770" y1="290" x2="581" y2="290" stroke="#4a3a8e" stroke-width="2" marker-end="url(#arrow-lav-3)"/>
  <text text-anchor="middle" x="675" y="282" fill="#262524" font-size="11" font-weight="600">PLUSD → receiver</text>
  <text text-anchor="middle" x="675" y="305" fill="#736f6c" font-size="10">reverts if receiver is not whitelisted</text>

  <!-- Unstake whitelist-gate callout -->
  <rect x="480" y="340" width="380" height="120" rx="6" fill="#ebeae9" stroke="#b1334b" stroke-width="1"/>
  <text text-anchor="middle" x="670" y="362" fill="#b1334b" font-size="11" font-weight="700">RECEIVER MUST BE WHITELISTED</text>
  <text text-anchor="middle" x="670" y="382" fill="#736f6c" font-size="11">Unstaking returns PLUSD, which carries the</text>
  <text text-anchor="middle" x="670" y="399" fill="#736f6c" font-size="11">whitelist gate. The PLUSD transfer to the receiver</text>
  <text text-anchor="middle" x="670" y="416" fill="#736f6c" font-size="11">reverts unless the receiver is KYC'd.</text>
  <text text-anchor="middle" x="670" y="443" fill="#b1334b" font-size="10" font-style="italic">To get USDC back, continue to Withdraw flow.</text>

  <!-- bottom note -->
  <rect x="20" y="488" width="860" height="32" rx="0" fill="none" stroke="none"/>
  <text text-anchor="middle" x="450" y="508" fill="#736f6c" font-size="10" font-style="italic">No lock-up · no cooldown · redeem any time the vault is unpaused</text>
</svg>
