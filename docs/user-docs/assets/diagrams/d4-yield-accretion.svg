<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="780" viewBox="0 0 1080 780" font-family="Graphik LC, Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="1080" height="780" fill="#ffffff"/>

  <defs>
    <marker id="arr-sage" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6b3a"/>
    </marker>
    <marker id="arr-amb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b9870a"/>
    </marker>
    <marker id="arr-nav" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000080"/>
    </marker>
  </defs>

  <text x="540" y="40" text-anchor="middle" fill="#262524" font-size="16" font-weight="600">Two engines feed the sPLUSD vault</text>
  <text x="540" y="60" text-anchor="middle" fill="#736f6c" font-size="12">both deliver yield through the same two-party YieldMinter call</text>

  <rect x="40" y="92" width="480" height="540" rx="10" fill="#f8f7f6" stroke="#2f6b3a" stroke-width="1.5"/>
  <text x="280" y="120" text-anchor="middle" fill="#2f6b3a" font-size="13" font-weight="700">ENGINE A · LOAN COUPONS</text>
  <text x="280" y="138" text-anchor="middle" fill="#736f6c" font-size="11">senior-tranche repayments from offtaker wires</text>

  <rect x="64" y="160" width="432" height="80" rx="6" fill="#ffffff" stroke="#2f6b3a" stroke-width="1"/>
  <rect x="64" y="160" width="32"  height="80" fill="#2f6b3a"/>
  <text x="80" y="206" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">1</text>
  <text x="112" y="184" fill="#262524" font-size="13" font-weight="600">Offtaker wires USDC to the Capital Wallet</text>
  <text x="112" y="206" fill="#736f6c" font-size="11">end-buyer payment for the cargo · on-chain ERC-20 transfer</text>
  <text x="112" y="224" fill="#736f6c" font-size="11">covers senior principal + senior interest</text>

  <rect x="64" y="260" width="432" height="80" rx="6" fill="#ffffff" stroke="#b9870a" stroke-width="1"/>
  <rect x="64" y="260" width="32"  height="80" fill="#b9870a"/>
  <text x="80" y="306" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">2</text>
  <text x="112" y="284" fill="#262524" font-size="13" font-weight="600">Trustee records the split on LoanRegistry</text>
  <text x="112" y="306" fill="#736f6c" font-size="11">recordRepayment(seniorPrincipal, seniorInterest, equity)</text>
  <text x="112" y="324" fill="#736f6c" font-size="11">accounting only — no USDC moves, no PLUSD mints</text>

  <rect x="64" y="360" width="432" height="80" rx="6" fill="#ffffff" stroke="#4a3a8e" stroke-width="1"/>
  <rect x="64" y="360" width="32"  height="80" fill="#4a3a8e"/>
  <text x="80" y="406" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">3</text>
  <text x="112" y="384" fill="#262524" font-size="13" font-weight="600">Relayer + custodian co-sign a YieldAttestation</text>
  <text x="112" y="406" fill="#736f6c" font-size="11">Relayer ECDSA + custodian EIP-1271, both verified on-chain</text>
  <text x="112" y="424" fill="#736f6c" font-size="11">neither party alone can mint</text>

  <rect x="64" y="460" width="432" height="80" rx="6" fill="#ffffff" stroke="#000080" stroke-width="1"/>
  <rect x="64" y="460" width="32"  height="80" fill="#000080"/>
  <text x="80" y="506" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">4</text>
  <text x="112" y="484" fill="#262524" font-size="13" font-weight="600">YieldMinter.yieldMint → PLUSD.mintForYield</text>
  <text x="112" y="506" fill="#736f6c" font-size="11">amount = senior coupon (net of fees) · destination = sPLUSD vault</text>
  <text x="112" y="524" fill="#736f6c" font-size="11">reserve invariant + maxTotalSupply checked atomically</text>

  <text x="280" y="572" text-anchor="middle" fill="#2f6b3a" font-size="12" font-weight="600">per-repayment event</text>
  <text x="280" y="590" text-anchor="middle" fill="#736f6c" font-size="11">share price ticks up when the vault leg lands</text>
  <text x="280" y="612" text-anchor="middle" fill="#736f6c" font-size="11">fees → Treasury Wallet in a separate yieldMint call</text>

  <rect x="560" y="92" width="480" height="540" rx="10" fill="#f8f7f6" stroke="#b9870a" stroke-width="1.5"/>
  <text x="800" y="120" text-anchor="middle" fill="#b9870a" font-size="13" font-weight="700">ENGINE B · T-BILL ACCRUAL</text>
  <text x="800" y="138" text-anchor="middle" fill="#736f6c" font-size="11">idle USDC parked in USYC, earns NAV drift</text>

  <rect x="584" y="160" width="432" height="80" rx="6" fill="#ffffff" stroke="#b9870a" stroke-width="1"/>
  <rect x="584" y="160" width="32"  height="80" fill="#b9870a"/>
  <text x="600" y="206" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">5</text>
  <text x="632" y="184" fill="#262524" font-size="13" font-weight="600">USYC NAV drifts up (Hashnote feed)</text>
  <text x="632" y="206" fill="#736f6c" font-size="11">~85% of reserves held as USYC · band 10–20% in USDC</text>
  <text x="632" y="224" fill="#736f6c" font-size="11">Relayer reads NAV from the Hashnote API</text>

  <rect x="584" y="260" width="432" height="80" rx="6" fill="#ffffff" stroke="#b9870a" stroke-width="1"/>
  <rect x="584" y="260" width="32"  height="80" fill="#b9870a"/>
  <text x="600" y="306" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">6</text>
  <text x="632" y="284" fill="#262524" font-size="13" font-weight="600">Any sPLUSD stake/unstake triggers reconciliation</text>
  <text x="632" y="306" fill="#736f6c" font-size="11">lazy accrual — no scheduled cron</text>
  <text x="632" y="324" fill="#736f6c" font-size="11">share price refreshes at the moment you interact</text>

  <rect x="584" y="360" width="432" height="80" rx="6" fill="#ffffff" stroke="#4a3a8e" stroke-width="1"/>
  <rect x="584" y="360" width="32"  height="80" fill="#4a3a8e"/>
  <text x="600" y="406" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">7</text>
  <text x="632" y="384" fill="#262524" font-size="13" font-weight="600">Relayer + custodian co-sign a YieldAttestation</text>
  <text x="632" y="406" fill="#736f6c" font-size="11">same two-party flow as Engine A · new salt per call</text>
  <text x="632" y="424" fill="#736f6c" font-size="11">replay guard checked inside YieldMinter</text>

  <rect x="584" y="460" width="432" height="80" rx="6" fill="#ffffff" stroke="#000080" stroke-width="1"/>
  <rect x="584" y="460" width="32"  height="80" fill="#000080"/>
  <text x="600" y="506" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">8</text>
  <text x="632" y="484" fill="#262524" font-size="13" font-weight="600">YieldMinter.yieldMint × 2 — vault and Treasury legs</text>
  <text x="632" y="506" fill="#736f6c" font-size="11">vault leg: 70% of NAV delta → sPLUSD vault</text>
  <text x="632" y="524" fill="#736f6c" font-size="11">treasury leg: 30% of NAV delta → Treasury Wallet</text>

  <text x="800" y="572" text-anchor="middle" fill="#b9870a" font-size="12" font-weight="600">lazy reconciliation</text>
  <text x="800" y="590" text-anchor="middle" fill="#736f6c" font-size="11">accrual visible on dashboard between mints</text>
  <text x="800" y="612" text-anchor="middle" fill="#736f6c" font-size="11">no time-based cron, no NAV-reading shortcut</text>

  <path d="M 280 632 Q 280 672, 480 690" fill="none" stroke="#2f6b3a" stroke-width="2.5" marker-end="url(#arr-sage)"/>
  <path d="M 800 632 Q 800 672, 600 690" fill="none" stroke="#b9870a" stroke-width="2.5" marker-end="url(#arr-amb)"/>

  <rect x="300" y="700" width="480" height="60" rx="8" fill="#000080" stroke="#000080" stroke-width="2"/>
  <text x="540" y="724" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">sPLUSD vault NAV</text>
  <text x="540" y="744" text-anchor="middle" fill="#ebe9e6b3" font-size="11">share price = totalAssets / totalSupply · moves only on yieldMint</text>
</svg>
