<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" font-family="Graphik LC, Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="960" height="640" fill="#ffffff"/>

  <defs>
    <marker id="a-sage-4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6b3a"/>
    </marker>
    <marker id="a-lav-4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a3a8e"/>
    </marker>
    <marker id="a-amb-4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b9870a"/>
    </marker>
  </defs>

  <!-- Title bar -->
  <text text-anchor="middle" x="480" y="32" fill="#262524" font-size="14" font-weight="700">Two engines stack into sPLUSD vault NAV</text>

  <!-- ========== ENGINE A: Loan Coupons (left column) ========== -->
  <rect x="20" y="56" width="440" height="440" rx="10" fill="rgba(158,206,106,0.04)" stroke="#2f6b3a" stroke-width="1.5"/>
  <text text-anchor="middle" x="240" y="82" fill="#2f6b3a" font-size="13" font-weight="700">ENGINE A · LOAN COUPONS</text>
  <text text-anchor="middle" x="240" y="100" fill="#736f6c" font-size="11">senior-tranche repayments of offtaker wires</text>

  <!-- A1. Borrower repays -->
  <rect x="40" y="120" width="400" height="60" rx="8" fill="#ebeae9" stroke="#2f6b3a" stroke-width="1"/>
  <circle cx="64" cy="150" r="12" fill="#2f6b3a"/>
  <text text-anchor="middle" x="64" y="154" fill="#ffffff" font-size="12" font-weight="700">1</text>
  <text x="88" y="144" fill="#262524" font-size="12" font-weight="600">Offtaker wires USDC to Capital Wallet</text>
  <text x="88" y="162" fill="#736f6c" font-size="10">end-buyer payment for the commodity · on-chain ERC-20</text>
  <text x="88" y="176" fill="#736f6c" font-size="10">(also covers Senior principal amortisation)</text>

  <!-- A2. Trustee attests + records -->
  <rect x="40" y="198" width="400" height="60" rx="8" fill="#ebeae9" stroke="#b9870a" stroke-width="1"/>
  <circle cx="64" cy="228" r="12" fill="#b9870a"/>
  <text text-anchor="middle" x="64" y="232" fill="#ffffff" font-size="12" font-weight="700">2</text>
  <text x="88" y="222" fill="#262524" font-size="12" font-weight="600">Trustee records the split on LoanRegistry</text>
  <text x="88" y="240" fill="#736f6c" font-size="10">recordRepayment(offtaker, seniorPrincipal, seniorInterest, equity)</text>
  <text x="88" y="254" fill="#736f6c" font-size="10">informational accounting — moves no USDC, mints no PLUSD</text>

  <!-- A3. Two-party attestation -->
  <rect x="40" y="276" width="400" height="60" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1"/>
  <circle cx="64" cy="306" r="12" fill="#4a3a8e"/>
  <text text-anchor="middle" x="64" y="310" fill="#ffffff" font-size="12" font-weight="700">3</text>
  <text x="88" y="300" fill="#262524" font-size="12" font-weight="600">Relayer + Custodian co-sign YieldAttestation</text>
  <text x="88" y="318" fill="#736f6c" font-size="10">Relayer ECDSA sig + Custodian EIP-1271 sig</text>
  <text x="88" y="332" fill="#736f6c" font-size="10">verified on-chain — neither alone can mint</text>

  <!-- A4. PLUSD.yieldMint(vault, amount) -->
  <rect x="40" y="354" width="400" height="60" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1"/>
  <circle cx="64" cy="384" r="12" fill="#4a3a8e"/>
  <text text-anchor="middle" x="64" y="388" fill="#ffffff" font-size="12" font-weight="700">4</text>
  <text x="88" y="378" fill="#262524" font-size="12" font-weight="600">PLUSD.yieldMint(sPLUSDvault, seniorCouponNet)</text>
  <text x="88" y="396" fill="#736f6c" font-size="10">reserve invariant checked · counters advance</text>
  <text x="88" y="410" fill="#736f6c" font-size="10">fees go separately to Treasury Wallet (same tx pattern)</text>

  <!-- A down-arrow to NAV bar -->
  <line x1="240" y1="430" x2="240" y2="516" stroke="#2f6b3a" stroke-width="3" marker-end="url(#a-sage-4)"/>
  <text text-anchor="middle" x="240" y="458" fill="#2f6b3a" font-size="10" font-style="italic">vault balance ↑</text>

  <!-- ========== ENGINE B: T-bill Accrual (right column) ========== -->
  <rect x="500" y="56" width="440" height="440" rx="10" fill="rgba(224,175,104,0.04)" stroke="#b9870a" stroke-width="1.5"/>
  <text text-anchor="middle" x="720" y="82" fill="#b9870a" font-size="13" font-weight="700">ENGINE B · T-BILL ACCRUAL</text>
  <text text-anchor="middle" x="720" y="100" fill="#736f6c" font-size="11">idle Capital-Wallet USDC parked in USYC</text>

  <!-- B1. USYC NAV ↑ -->
  <rect x="520" y="120" width="400" height="60" rx="8" fill="#ebeae9" stroke="#b9870a" stroke-width="1"/>
  <circle cx="544" cy="150" r="12" fill="#b9870a"/>
  <text text-anchor="middle" x="544" y="154" fill="#ffffff" font-size="12" font-weight="700">5</text>
  <text x="568" y="144" fill="#262524" font-size="12" font-weight="600">USYC NAV drifts up (Hashnote feed)</text>
  <text x="568" y="162" fill="#736f6c" font-size="10">~15% USDC held as USYC · target band 10–20%</text>
  <text x="568" y="176" fill="#736f6c" font-size="10">Relayer reads NAV off-chain every minute</text>

  <!-- B2. Lazy trigger on sPLUSD deposit/redeem -->
  <rect x="520" y="198" width="400" height="60" rx="8" fill="#ebeae9" stroke="#b9870a" stroke-width="1"/>
  <circle cx="544" cy="228" r="12" fill="#b9870a"/>
  <text text-anchor="middle" x="544" y="232" fill="#ffffff" font-size="12" font-weight="700">6</text>
  <text x="568" y="222" fill="#262524" font-size="12" font-weight="600">Any sPLUSD stake/unstake triggers reconciliation</text>
  <text x="568" y="240" fill="#736f6c" font-size="10">lazy accrual — no scheduled cron</text>
  <text x="568" y="254" fill="#736f6c" font-size="10">keeps share price current at settlement</text>

  <!-- B3. Two-party attestation (same as A3) -->
  <rect x="520" y="276" width="400" height="60" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1"/>
  <circle cx="544" cy="306" r="12" fill="#4a3a8e"/>
  <text text-anchor="middle" x="544" y="310" fill="#ffffff" font-size="12" font-weight="700">7</text>
  <text x="568" y="300" fill="#262524" font-size="12" font-weight="600">Relayer + Custodian co-sign YieldAttestation</text>
  <text x="568" y="318" fill="#736f6c" font-size="10">same two-party flow · new salt per call</text>
  <text x="568" y="332" fill="#736f6c" font-size="10">reserve invariant checked</text>

  <!-- B4. PLUSD.yieldMint split 70/30 -->
  <rect x="520" y="354" width="400" height="60" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="1"/>
  <circle cx="544" cy="384" r="12" fill="#4a3a8e"/>
  <text text-anchor="middle" x="544" y="388" fill="#ffffff" font-size="12" font-weight="700">8</text>
  <text x="568" y="378" fill="#262524" font-size="12" font-weight="600">PLUSD.yieldMint — 70% to vault, 30% to Treasury</text>
  <text x="568" y="396" fill="#736f6c" font-size="10">vault leg: yieldMint(sPLUSDvault, 70% of delta)</text>
  <text x="568" y="410" fill="#736f6c" font-size="10">treasury leg: yieldMint(TreasuryWallet, 30% of delta)</text>

  <!-- B down-arrow to NAV bar -->
  <line x1="720" y1="430" x2="720" y2="516" stroke="#b9870a" stroke-width="3" marker-end="url(#a-amb-4)"/>
  <text text-anchor="middle" x="720" y="458" fill="#b9870a" font-size="10" font-style="italic">vault balance ↑ (70% share)</text>

  <!-- ========== sPLUSD vault NAV bar ========== -->
  <rect x="20" y="524" width="920" height="56" rx="8" fill="#ebeae9" stroke="#4a3a8e" stroke-width="2"/>
  <text text-anchor="middle" x="480" y="548" fill="#4a3a8e" font-size="14" font-weight="700">sPLUSD vault NAV</text>
  <text text-anchor="middle" x="480" y="568" fill="#736f6c" font-size="11">totalAssets = PLUSD.balanceOf(vault) · share price = totalAssets / totalSupply</text>

  <!-- bottom note -->
  <text text-anchor="middle" x="480" y="608" fill="#736f6c" font-size="11" font-style="italic">Yield only appears in the vault after an actual yieldMint call lands on-chain. No time-based accrual, no NAV-reading shortcut.</text>
  <text text-anchor="middle" x="480" y="626" fill="#736f6c" font-size="10">Share price moves only on yieldMint — nothing else changes it.</text>
</svg>
