  <rect x="200" y="100" width="480" height="80" fill="#b9870a"/>
  <rect x="680" y="100" width="176" height="80" fill="#4a3a8e"/>
  <rect x="856" y="100" width="24"  height="80" fill="#000080"/>

  <text x="140" y="146" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="600">15%</text>
