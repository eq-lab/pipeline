<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" font-family="Graphik LC, Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="960" height="280" fill="#ffffff"/>

