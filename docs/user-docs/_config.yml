title: Pipeline
tagline: On-chain yield from commodity trade finance.
description: >-
  Pipeline is a decentralized commodity trade finance protocol. 
  Lenders deposit USDC and earn from senior lending to finance commodity 
  trades — high yield, short duration, secured by physical cargo, self-liquidating, 
  tracked on a public on-chain registry.
url: https://docs.pipeline.one
baseurl: ""
permalink: /:path/

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  auto_ids: true
  toc_levels: "2..3"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

exclude:
  - scripts/
  - README.md
  - Gemfile
  - Gemfile.lock

defaults:
  - scope:
      path: ""
    values:
      layout: default
