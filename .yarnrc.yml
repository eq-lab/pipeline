nodeLinker: node-modules
yarnPath: .yarn/releases/yarn-4.13.0.cjs

# Supply-chain hardening: refuse to install any package version whose npm
# publish-date is younger than this. Catches the mini-shai-hulud-style
# attacks where malicious tarballs are published and pulled within hours.
# To intentionally install a too-fresh version, allowlist it via
# `npmPreapprovedPackages` rather than lowering this gate.
npmMinimalAgeGate: "14d"
